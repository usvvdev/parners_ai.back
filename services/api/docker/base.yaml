x-base-service: &base-service
  restart: unless-stopped
  build:
    context: ../../
    dockerfile: services/api/docker/Dockerfile
  environment:
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
    - TZ=UTC

services:
  api:
    <<: *base-service
    container_name: api
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080', timeout=5)"]
      interval: 30s   
      timeout: 10s   
      retries: 3      
      start_period: 15s

networks:
  default:
    driver: bridge
    name: backend_network
    external: true

