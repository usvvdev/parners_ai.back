x-base-service: &base-service
  restart: unless-stopped
  build:
    context: ../../
    dockerfile: services/browser_agent/docker/Dockerfile
  environment:
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
    - TZ=UTC

services:
  browser_agent:
    <<: *base-service
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s   
      timeout: 10s   
      retries: 3      
      start_period: 15s
    depends_on:
      mysql:
        condition: service_healthy

