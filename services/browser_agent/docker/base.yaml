x-base-service: &base-service
  restart: "no"
  build:
    context: ../../
    dockerfile: services/browser_agent/docker/Dockerfile
  environment:
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
    - TZ=UTC

services:
  browser_agent:
    <<: *base-service
    container_name: browser_agent
    volumes:
      - easyocr_models:/models/easyocr
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s   
      timeout: 10s   
      retries: 3      
      start_period: 15s

volumes:
  easyocr_models:

networks:
  default:
    driver: bridge
    name: backend_network
    external: true

